# Tek kontrol düzlemi + iki worker.
#
# Neden iki worker? Arena Pod'larının sunucudan BAŞKA bir düğüme
# düşebildiğini görmek için. Tek düğümlü kümede "uzak arena" anlatısı
# kâğıt üstünde kalır; gateway'in gRPC vekilliği gerçek bir ağ atlamasını
# geçmez ve Faz 6'nın chaos adımında düğüm çökertecek bir yedeğimiz olmaz.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: shardlands
nodes:
  - role: control-plane
    extraPortMappings:
      # Hub'ı tarayıcıdan aç: http://localhost:30080
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
  - role: worker
  - role: worker
