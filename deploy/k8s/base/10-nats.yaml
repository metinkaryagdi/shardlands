# NATS JetStream: event bus artık sunucu sürecine GÖMÜLÜ değil.
#
# Neden ayrıldı? Gömülü bus, sunucu yeniden başlatıldığında bus'ı da
# götürüyordu; outbox relay'in checkpoint'i kalıcı olsa bile stream'ler
# süreç ömrüne bağlıydı. Ayrı StatefulSet + PVC ile bus bağımsız yaşar
# ve tüketiciler (read model'ler) sunucudan bağımsız ölçeklenebilir.
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: shardlands
spec:
  clusterIP: None # headless: StatefulSet DNS'i (nats-0.nats)
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
    - name: monitor
      port: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: shardlands
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
      annotations:
        # NATS "ÖNCE SUNUCU KONUŞUR" bir protokoldür: bağlantı kurulur
        # kurulmaz sunucu INFO {...} yollar. Linkerd portun protokolünü
        # ilk baytlara bakarak algılar; istemciden bayt beklerken sunucu
        # da istemciyi beklediği için algılama ~10sn zaman aşımına düşer
        # ve HER NATS bağlantısı o kadar gecikmeyle başlardı.
        #
        # Portu "opak" ilan etmek = "çözümlemeye çalışma, şifreli TCP
        # olarak taşı". mTLS yine uygulanır; kaybedilen tek şey
        # protokol-farkında metrikler. Aynı tuzak MySQL, PostgreSQL ve
        # SMTP için de geçerli (docs/service-mesh.md §6b).
        config.linkerd.io/opaque-ports: "4222"
    spec:
      securityContext:
        # nats imajı uid 1000 ile koşar; PVC'nin sahipliği ona verilmezse
        # JetStream store_dir'e yazamaz.
        fsGroup: 1000
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "--jetstream"
            - "--store_dir=/data"
            - "--http_port=8222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
