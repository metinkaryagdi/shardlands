# PodDisruptionBudget — GÖNÜLLÜ kesintilere karşı koruma.
#
# En sık yanlış anlaşılan Kubernetes kaynağı. PDB, Pod'un çökmesini,
# OOM yemesini ya da düğümün patlamasını ENGELLEMEZ; bunlar gönülsüz
# (involuntary) kesintilerdir ve PDB'nin haberi bile olmaz.
#
# PDB yalnız EVICTION API'sinden geçen işlemleri durdurur:
# `kubectl drain`, küme otomatik ölçekleyicinin düğüm toplaması,
# düğüm yükseltmeleri. Yani "bakım sırasında beni tek başıma bırakma"
# sözleşmesidir.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: player
  namespace: shardlands
spec:
  # İki kopyadan en az biri her zaman ayakta kalsın. Düğüm boşaltılırken
  # ikisi birden gitmez; drain, ikincisini almadan önce birincinin
  # yerine geçen Pod'un hazır olmasını bekler.
  minAvailable: 1
  selector:
    matchLabels:
      app: shardlands-player
#
# ARENA İÇİN PDB YOK — ve bu deneyle öğrenilmiş bir karar.
#
# Önce `maxUnavailable: 0` ile bir arena PDB'si yazdık: "devam eden maç
# gönüllü olarak tahliye edilemesin". Manifest doğru görünüyordu ve
# `kubectl get pdb` çıktısı da ikna ediciydi:
#
#   arena    N/A   0   ALLOWED DISRUPTIONS: 0
#
# "0 izin verilen kesinti" tam korunuyor gibi okunur. DEĞİLDİ. Chaos
# deneyi 6'da API'nin kendi olayı gerçeği söyledi:
#
#   CalculateExpectedPodCountFailed: Failed to calculate the number of
#   expected pods: arenas.shardlands.dev does not implement the scale
#   subresource
#
# NEDEN: disruption denetleyicisi "kaç Pod olmalı" sorusunu, Pod'un
# sahiplik zincirini yukarı yürüyüp ÖLÇEKLENEBİLİR bir denetleyici
# (Deployment/ReplicaSet/StatefulSet — `scale` alt kaynağı olan)
# bularak cevaplar. Arena Pod'larının sahibi bizim Arena CRD'miz ve
# onda `scale` yok. Beklenen sayı hesaplanamayınca PDB hiçbir şey
# uygulayamıyor; gösterilen "0" koruma değil BİLİNMEZLİK.
#
# Seçenekler ve neden bu:
#   - CRD'ye scale alt kaynağı eklemek: arena ölçeklenebilir bir iş
#     yükü değil, `replicas` alanı anlamsız olurdu.
#   - ownerReference'ı kaldırmak: sahipsiz Pod'lar için PDB çalışır ama
#     çöp toplama garantisini kaybederdik (Faz 5'in temizlik akışı).
#   - PDB'yi bırakıp gerçeği yazmak: SEÇİLEN. Devam eden maçın korunması
#     kısa ömürden geliyor (TTL 5dk, tipik maç 90sn) ve arena Pod'u
#     düşerse operator onu geri getiriyor — maç durumu kaybolur ama
#     sistem kendini toparlar (chaos deneyi 5).
#
# Genel ders: bir güvenlik/dayanıklılık kontrolünün panoda doğru
# görünmesi, çalıştığı anlamına gelmiyor. Faz 6'da bunun üçüncü örneği
# (diğerleri: sessizce meshsiz açılan Pod'lar, hız sınırını kesinti
# sanan ölçüm aracı).
