# Player servisi: kimlik ve token basımı.
#
# NEDEN AYRI POD? Ölçek için değil, GÜVENLİK için. Bu servis Faz 6'ya
# kadar hub süreciyle aynı süreçte, 127.0.0.1:9101 üstünden koşuyordu.
# Mesh proxy'si loopback trafiğini yakalamaz — o atlamaya yazılacak bir
# yetkilendirme politikası hiçbir şeyi engellemez, yalnız panoda yeşil
# görünürdü. Servis gerçekten ayrıldığı için artık "token basmaya yalnız
# hub kimliği yetkilidir" kuralının denetleyecek bir atlaması var.
# Bkz. docs/service-mesh.md §5.
#
# NEDEN Deployment? Durumsuz: kayıt defterini bellekte tutuyor ama onu
# kimse okumuyor (GetPlayer RPC'si çağrılmıyor), kalıcı bir sözü yok.
#
# replicas=2 — kümedeki TEK gerçekten kesintisiz bileşen. Bunu mümkün
# kılmak için servisin gizli durumu düzeltilmek zorunda kaldı: kimlik
# sayacı kopya başına artıyordu ve iki kopya aynı "p-1"i basardı.
# Kimlikler artık Pod adından türeyen bir ön ek taşıyor
# (services/player: NewInstance). Bkz. docs/zero-downtime.md §2.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shardlands-player
  namespace: shardlands
---
apiVersion: v1
kind: Service
metadata:
  name: player
  namespace: shardlands
spec:
  selector:
    app: shardlands-player
  ports:
    - name: grpc
      port: 9101
      targetPort: 9101
      # DEĞER ÖNEMLİ: "grpc" DEĞİL, "kubernetes.io/h2c".
      #
      # appProtocol mesh'e protokolü söyler ve algılamayı atlatır. Ama
      # Linkerd yalnız Gateway API'nin standart değerlerini tanır;
      # tanımadığı bir değer gördüğünde bağlantıyı HTTP/1'e düşürür.
      # gRPC istemcisi HTTP/2 preface yollayınca karşı taraf onu
      # anlamaz ve bağlantı kapanır:
      #
      #   rpc error: code = Unavailable desc = connection error:
      #   desc = "error reading server preface: EOF"
      #
      # Belirtinin sinsiliği: hata TLS ya da politika sorunu gibi
      # görünür, hatta player proxy'sinde "Connection denied" olarak
      # loglanır — çünkü Server gRPC bekliyor, gelen HTTP/1. Saatlerce
      # yanlış yerde aranır (arandı).
      appProtocol: kubernetes.io/h2c
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: player
  namespace: shardlands
spec:
  replicas: 2
  # maxUnavailable: 0 — yeni Pod HAZIR OLMADAN eskisi düşmez. Kapasite
  # asla azalmaz, en fazla geçici olarak artar (maxSurge). Kesintisiz
  # dağıtımın manifest tarafındaki tek satırlık özeti budur; geri kalanı
  # readiness probu ile preStop'un doğru kurulmasıdır.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: shardlands-player
  template:
    metadata:
      labels:
        app: shardlands-player
      annotations:
        # Metrikler AYRI PORTTA (9102). gRPC portunu çift protokole
        # zorlamaktansa ikinci bir port açmak hem basit hem de politika
        # tarafında temiz: 9101 yalnız hub'a, 9102 yalnız Prometheus'a.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9102"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: shardlands-player
      # 30sn: GracefulStop akıştaki gRPC çağrılarını bitirene kadar
      # bekleyebilsin. Süre dolarsa kubelet SIGKILL yollar.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: player
          image: shardlands/player:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9101
              name: grpc
            - containerPort: 9102
              name: admin
          # Hub ile AYNI ConfigMap'lerden besleniyor: token'ı basan ile
          # doğrulayan aynı anahtarı görmek zorunda. Ayrı yerlerden
          # beslenselerdi rotasyon sırasında ayrışabilirlerdi.
          envFrom:
            - configMapRef:
                name: shardlands-config
            # Vault ayarları İSTEĞE BAĞLI: bu ConfigMap yalnız
            # deploy/k8s/vault/ uygulandığında var olur. optional:true
            # olmadan, Vault'suz kurulumda Pod hiç başlamazdı.
            - configMapRef:
                name: shardlands-vault-config
                optional: true
          env:
            - name: SHARDLANDS_SECRET
              valueFrom:
                secretKeyRef:
                  name: shardlands-secret
                  key: SHARDLANDS_SECRET
            # Aşağı yönlü API: Pod adı kimlik ön eki olur.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          lifecycle:
            preStop:
              # KESİNTİSİZ DAĞITIMIN EN ÇOK ATLANAN PARÇASI.
              #
              # Pod silinince iki şey PARALEL başlar:
              #   1) kubelet SIGTERM yollar,
              #   2) endpoints denetleyicisi Pod'u Endpoints'ten düşürür
              #      ve kube-proxy / mesh proxy'leri tablolarını günceller.
              # (1) neredeyse her zaman (2)'yi yener. Uygulama SIGTERM'i
              # alıp hemen kapanırsa, hâlâ bu Pod'a yönlendiren istemciler
              # "connection refused" alır — kapanış "zarif" olduğu halde
              # istek kaybedilir.
              #
              # preStop, SIGTERM'i geciktirir: yayılma tamamlanır, sonra
              # kapanış başlar. Uygulamada değişiklik gerektirmez.
              #
              # `sleep` eylemi (K8s 1.30+) distroless için şart: imajda
              # kabuk yok, `exec: ["sh","-c","sleep 5"]` çalışmaz.
              sleep:
                seconds: 5
          # Artık gerçek bir HTTP sağlık ucu var (yönetim portunda).
          # TCP probu yalnız "port açık mı" derdi; /healthz "süreç
          # cevap verebiliyor mu" der — sıkışmış bir süreç TCP'yi
          # açık tutar ama HTTP'ye cevap veremez.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9102
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9102
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
