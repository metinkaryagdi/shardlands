# HUB — oyuncuların girdiği kapı. Mesh'in KENARI (edge).
#
# Burada zero trust'ın sınırı var ve bunu söylemek dürüstlük meselesi:
# oyuncular mesh'in DIŞINDAN gelir. Tarayıcının ServiceAccount'u yoktur,
# mTLS kimliği yoktur. Dolayısıyla bu portu kimlik temelli
# kısıtlayamayız — "kimliği doğrulanmamış herkes" demek zorundayız.
#
# Zero trust'ın burada devam etmesinin yolu mesh değil UYGULAMA
# katmanıdır: JWT doğrulaması (pkg/auth), IP başına hız sınırı
# (pkg/ratelimit) ve oturum fencing token'ı. Mesh iç atlamaları korur;
# kenarı uygulama korur. İkisini karıştırmak, kenarda mTLS varmış
# yanılsaması üretir.
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: hub-http
  namespace: shardlands
spec:
  podSelector:
    matchLabels:
      app: shardlands-server
  port: http
  proxyProtocol: HTTP/1 # WebSocket yükseltmesi HTTP/1 üstünden
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: hub-http-public
  namespace: shardlands
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: hub-http
  requiredAuthenticationRefs:
    # Küme ağından gelen her şey: NodePort trafiği kube-proxy üstünden
    # düğüm ağıyla gelir, kubelet probları da öyle. Üretimde bunun yerine
    # yalnız ingress denetleyicisinin KİMLİĞİ yazılır ve dış dünya
    # ingress'te sonlanır — o zaman bu kaynak MeshTLSAuthentication olur.
    - group: policy.linkerd.io
      kind: NetworkAuthentication
      name: cluster-networks
