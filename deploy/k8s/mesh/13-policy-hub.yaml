# HUB — oyuncuların girdiği kapı. Mesh'in KENARI (edge).
#
# Burada zero trust'ın sınırı var ve bunu söylemek dürüstlük meselesi:
# oyuncular mesh'in DIŞINDAN gelir. Tarayıcının ServiceAccount'u yoktur,
# mTLS kimliği yoktur. Dolayısıyla bu portu kimlik temelli
# kısıtlayamayız — "kimliği doğrulanmamış herkes" demek zorundayız.
#
# Zero trust'ın burada devam etmesinin yolu mesh değil UYGULAMA
# katmanıdır: JWT doğrulaması (pkg/auth), IP başına hız sınırı
# (pkg/ratelimit) ve oturum fencing token'ı. Mesh iç atlamaları korur;
# kenarı uygulama korur. İkisini karıştırmak, kenarda mTLS varmış
# yanılsaması üretir.
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: hub-http
  namespace: shardlands
spec:
  podSelector:
    matchLabels:
      app: shardlands-server
  port: http
  proxyProtocol: HTTP/1 # WebSocket yükseltmesi HTTP/1 üstünden
#
# BU SERVER İÇİN SERVER DÜZEYİNDE AuthorizationPolicy YOK — ve bu
# Faz 7'de deneyle öğrenilmiş bir karar.
#
# Başlangıçta burada `hub-http-public` adında, Server'ı hedefleyen bir
# politika vardı (küme ağına izin). Faz 7'de /metrics yolunu yalnız
# Prometheus kimliğine açmak isteyince şu ortaya çıktı: SERVER
# DÜZEYİNDEKİ İZİN, ROTA DÜZEYİNDEKİ KISITI GEÇERSİZ KILAR. İkisi
# birleşim (union) olarak değerlendiriliyor; portun tamamına "serbest"
# diyen bir kural varken tek bir rotayı daraltmak hiçbir şey yapmıyor.
#
# Belirti yine sinsiydi: manifest doğru görünüyordu, `kubectl get
# authorizationpolicy` her ikisini de listeliyordu, ama dışarıdan
# /metrics çağrısı 200 dönüyordu.
#
# Kural: bir portta rota bazlı yetkilendirmeye geçtiysen TÜM
# yetkilendirmeyi rota düzeyine taşı. Yetkilendirme kuralları
# 15-policy-metrics.yaml'da:
#   /metrics  -> yalnız Prometheus kimliği
#   /  (diğer) -> küme ağı (oyuncular, kubelet probları)
