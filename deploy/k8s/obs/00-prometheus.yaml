# Prometheus — çekme (pull) modeli.
#
# Prometheus hedeflerine GİDER, hedefler ona göndermez. Bunun üç somut
# sonucu var ve üçü de bu kurulumu şekillendirdi:
#
#   - Hedefin Prometheus'u tanıması gerekmez; uygulama yalnız /metrics
#     açar. Yeni bir servis eklemek uygulama tarafında sıfır iş.
#   - "Hedef ayakta mı?" sorusu BEDAVA gelir (`up` metriği). Push
#     modelinde susan bir servisle hiç var olmamış servis ayırt edilemez.
#   - Ama Prometheus'un hedeflere ULAŞABİLMESİ gerekir — ve bizim
#     namespace'imizde varsayılan politika `deny`. Bu yüzden metrik
#     portları için ayrı bir yetkilendirme yazıldı (15-policy-metrics).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: shardlands
---
# Servis keşfi için Pod okuma yetkisi. Prometheus'un kümede ne
# çalıştığını öğrenmesinin yolu API sunucusudur; statik hedef listesi
# yazmak Pod'lar geldiği/gittiği için sürdürülemez.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus
  namespace: shardlands
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus
  namespace: shardlands
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: shardlands
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shardlands
data:
  prometheus.yml: |
    global:
      # 15sn: 20Hz'lik bir dünya döngüsü için yeterli çözünürlük.
      # Daha sık çekmek seri sayısını değil ÖRNEK sayısını artırır;
      # depolama maliyeti oradan gelir.
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Uygulama Pod'ları: annotation ile kendilerini işaretleyenler.
      # "Prometheus'a yeni hedef eklemek" = Pod'a annotation koymak;
      # bu dosyaya dokunmak gerekmez.
      - job_name: shardlands-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [shardlands]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Pod adı ve iş yükü etiketi: sorgularda "hangi kopya"
          # sorusunu cevaplar. player_id GİBİ DEĞİL — bu etiketler
          # sınırlı sayıda değer alır (kardinalite güvenli).
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      # Linkerd proxy'lerinin kendi metrikleri (4191): istek oranı,
      # gecikme ve mTLS durumu UYGULAMADAN BAĞIMSIZ olarak buradan
      # gelir. Uygulama hiç enstrümante edilmese bile mesh, altın
      # sinyalleri verir — sidecar'ın en somut kazançlarından biri.
      - job_name: linkerd-proxy
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [shardlands]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: linkerd-proxy
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:4191
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shardlands
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: shardlands
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.1.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/data"
            # Öğrenme kurulumu: 6 saatlik saklama yeter ve emptyDir'e
            # sığar. Üretimde PVC + uzun saklama ya da uzak yazma
            # (Thanos/Mimir) gerekir.
            - "--storage.tsdb.retention.time=6h"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus/prometheus.yml, subPath: prometheus.yml }
            - { name: rules, mountPath: /etc/prometheus/rules }
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
            optional: true
        - name: data
          emptyDir: {}
