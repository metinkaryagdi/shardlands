apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arenas.shardlands.dev
spec:
  group: shardlands.dev
  scope: Namespaced
  names:
    kind: Arena
    listKind: ArenaList
    plural: arenas
    singular: arena
    shortNames: [ar]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [mode, players]
              properties:
                mode:
                  type: string
                  enum: ["1v1", "2v2"]
                  description: Arena türü.
                players:
                  type: array
                  description: Maça atanmış oyuncular.
                  items:
                    type: object
                    required: [id, team]
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      team:
                        type: integer
                        minimum: 0
                        maximum: 1
                ttlSeconds:
                  type: integer
                  format: int32
                  minimum: 0
                  description: >-
                    Azami ömür. Aşılırsa arena Completed sayılır ve Pod
                    temizlenir (kaçak instance emniyeti).
                image:
                  type: string
                  description: Arena sunucusu konteyner imajı.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Completed, Failed]
                podName:
                  type: string
                endpoint:
                  type: string
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                  description: >-
                    Terminal faza geçiş anı. Kayıt bu andan kısa süre
                    sonra toplanır; süresiz kalan kayıtlar aynı adı
                    yeniden üreten sunucularla çakışıyordu.
                message:
                  type: string
