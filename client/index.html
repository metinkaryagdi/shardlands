<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Shardlands</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0d1117; color: #c9d1d9;
         font-family: system-ui, sans-serif; display: flex;
         flex-direction: column; align-items: center; gap: 12px; padding: 24px; }
  h1 { margin: 0; font-size: 20px; letter-spacing: 2px; }
  #login { display: flex; gap: 8px; }
  input, button { font-size: 16px; padding: 8px 12px; border-radius: 6px;
                  border: 1px solid #30363d; background: #161b22; color: inherit; }
  button { cursor: pointer; background: #1f6feb; border-color: #1f6feb; color: white; }
  button:disabled { opacity: 0.5; cursor: default; }
  #arenaBtn { background: #a371f7; border-color: #a371f7; }
  canvas { border: 1px solid #30363d; border-radius: 8px; background: #10151c; }
  canvas.arena { border-color: #a371f7; background: #16101c; cursor: crosshair; }
  #hud { font-size: 13px; color: #8b949e; min-height: 1em; }
  #bar { display: flex; gap: 8px; align-items: center; }
  #trade { display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
           font-size: 13px; width: 780px; }
  #trade[hidden], #bar[hidden] { display: none; } /* hidden inline display'i ezmesin */
  #trade select, #trade input, #trade button { padding: 4px 6px; }
</style>
</head>
<body>
<h1>SHARDLANDS</h1>
<div id="globals" hidden style="font-size:13px; color:#8b949e;">
  🌍 toplam toplanan: <b id="gTotal">0</b> <span style="opacity:0.6">(CRDT)</span>
  · çevrimiçi: <b id="gOnline">0</b>
</div>
<div id="login">
  <input id="name" placeholder="isim" maxlength="24" autofocus>
  <button id="go">Hub'a Katıl</button>
</div>
<div id="bar" hidden>
  <button id="arenaBtn">⚔ Arena'ya Gir (1v1)</button>
  <span id="arenaMsg" style="font-size:13px; color:#8b949e;"></span>
</div>
<canvas id="c" width="800" height="600" hidden></canvas>
<input id="chat" placeholder="mesaj yaz — Enter ile gönder" maxlength="120" hidden
       style="width: 780px;">
<div id="chatlog" style="font-size: 13px; color: #8b949e; width: 780px; min-height: 4.5em;"></div>
<div id="trade" hidden>
  <span style="color:#8b949e;">takas:</span> ver
  <select id="giveKind"><option value="wood">odun</option><option value="crystal">kristal</option></select>
  <input id="giveAmt" type="number" min="1" value="1" style="width:52px;">
  → al
  <select id="wantKind"><option value="crystal">kristal</option><option value="wood">odun</option></select>
  <input id="wantAmt" type="number" min="1" value="1" style="width:52px;">
  ile
  <select id="partner"></select>
  <button id="offer">Teklif Et</button>
  <span id="tradeMsg" style="color:#8b949e;"></span>
</div>
<div id="hud"></div>
<script>
"use strict";
const $ = id => document.getElementById(id);
const canvas = $("c"), ctx = canvas.getContext("2d");
const KIND_TR = { wood: "odun", crystal: "kristal" };

// mode: "hub" | "queue" | "arena". Sunucu otoriter; bu yalnız
// hangi ekranı çizeceğimizi ve komutları nasıl yorumlayacağımızı belirler.
let mode = "hub";
let ws = null;

// hub durumu
let me = null, players = [], nodes = [], tick = 0, inventory = {};
let region = "", shard = "", cols = 2, rows = 2;

// arena durumu
let arena = null;      // son arena karesi
let myTeam = 0;        // hangi takımdayım (arena-enter'dan)
let mouse = { x: 300, y: 200 }; // nişan için imleç (arena koordinatı)

async function join() {
  const name = $("name").value.trim();
  if (!name) return;
  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  if (!res.ok) { $("hud").textContent = "giriş hatası: " + await res.text(); return; }
  const { playerId, token } = await res.json();
  window.__token = token;

  const proto = location.protocol === "https:" ? "wss" : "ws";
  const wsURL = `${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`;

  // KESİNTİSİZ DAĞITIMIN SON METRESİ İSTEMCİDEDİR (docs/zero-downtime.md §4):
  // hub tek kopya olduğu için yeniden dağıtım kısa bir kesinti üretir;
  // istemci kopan bağlantıyı üstel geri çekilme + JİTTER ile toparlar.
  let firstOpen = true, retry = 0, invTimer = null;

  function connect() {
    ws = new WebSocket(wsURL);

    ws.onopen = () => {
      retry = 0;
      setHudDefault();
      if (!firstOpen) return;
      firstOpen = false;
      // Tek seferlik kurulum: yeniden bağlanmada TEKRARLANMAMALI.
      $("login").hidden = true;
      canvas.hidden = false;
      $("bar").hidden = false;
      $("chat").hidden = false;
      $("trade").hidden = false;
      $("globals").hidden = false;
      refreshChatLog();
      refreshStats();
      setInterval(refreshChatLog, 5000);
      setInterval(refreshStats, 2000);
    };

    ws.onclose = () => {
      const delay = Math.min(500 * 2 ** retry, 8000) * (0.5 + Math.random());
      retry++;
      $("hud").textContent = `bağlantı koptu — ${(delay / 1000).toFixed(1)}sn içinde yeniden bağlanılıyor…`;
      setTimeout(connect, delay);
    };

    ws.onmessage = ev => {
      const m = JSON.parse(ev.data);
      switch (m.type) {
        case "welcome":
          me = m.id; cols = m.cols || 2; rows = m.rows || 2;
          refreshInventory();
          if (!invTimer) invTimer = setInterval(refreshInventory, 3000);
          break;

        case "snapshot": // hub karesi
          tick = m.tick; players = m.players; nodes = m.nodes || [];
          region = m.region || ""; shard = m.shard || "";
          if (mode !== "arena") draw();
          break;

        case "queued":
          $("arenaMsg").textContent = `kuyruktasın (${m.mode}) — rakip bekleniyor…`;
          $("arenaBtn").disabled = true;
          break;

        case "queue-error":
          $("arenaMsg").textContent = "kuyruk hatası: " + m.error;
          $("arenaBtn").disabled = false;
          break;

        case "arena-enter": // hub'dan arenaya geçiş
          mode = "arena";
          myTeam = m.team;
          arena = null;
          canvas.width = m.w; canvas.height = m.h;
          canvas.classList.add("arena");
          // arena modunda hub panelleri anlamsız
          $("chat").hidden = true; $("trade").hidden = true;
          $("arenaBtn").disabled = true;
          $("arenaMsg").textContent = `ARENA · takım ${m.team === 0 ? "MAVİ" : "KIRMIZI"} · fare ile nişan al, TIKLA = ateş`;
          break;

        case "arena": // arena karesi
          arena = m;
          drawArena();
          break;

        case "hub-enter": // arenadan hub'a dönüş
          mode = "hub";
          arena = null;
          canvas.width = 800; canvas.height = 600;
          canvas.classList.remove("arena");
          $("chat").hidden = false; $("trade").hidden = false;
          $("arenaBtn").disabled = false;
          $("arenaMsg").textContent = "arenadan döndün — tekrar girebilirsin";
          region = m.region || region; shard = m.shard || shard;
          break;
      }
    };
  }
  connect();

  // ---- Arena kuyruğu ----
  $("arenaBtn").onclick = () => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "queue", mode: "1v1" }));
      $("arenaMsg").textContent = "kuyruğa giriliyor…";
    }
  };

  // ---- Takas (hub) ----
  $("offer").onclick = async () => {
    const partner = $("partner").value;
    if (!partner) { $("tradeMsg").textContent = "yakında oyuncu yok"; return; }
    $("tradeMsg").textContent = "işleniyor…";
    try {
      const res = await fetch(`/api/trade?token=${encodeURIComponent(token)}`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          counterparty: partner,
          giveKind: $("giveKind").value, giveAmount: +$("giveAmt").value,
          wantKind: $("wantKind").value, wantAmount: +$("wantAmt").value,
        }),
      });
      const r = await res.json();
      $("tradeMsg").textContent = r.phase === "settled" ? "✓ takas tamam" : `✗ ${r.reason || r.phase}`;
      refreshInventory();
    } catch (e) { $("tradeMsg").textContent = "hata"; }
  };

  // ---- Girdi: basılı tuş DURUMU gönderilir (pozisyon değil — sunucu
  // otoriter). Aynı "input" mesajı hem hub hem arenada geçerli; sunucu
  // moda göre yönlendirir. ----
  const keys = { up: false, down: false, left: false, right: false };
  const map = { KeyW: "up", ArrowUp: "up", KeyS: "down", ArrowDown: "down",
                KeyA: "left", ArrowLeft: "left", KeyD: "right", ArrowRight: "right" };
  const setKey = (code, val) => {
    const k = map[code];
    if (!k || keys[k] === val) return;
    keys[k] = val;
    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "input", ...keys }));
  };
  const typing = () => document.activeElement === $("chat");
  addEventListener("keydown", e => { if (!typing() && map[e.code]) { e.preventDefault(); setKey(e.code, true); } });
  addEventListener("keyup",   e => { if (!typing() && map[e.code]) { e.preventDefault(); setKey(e.code, false); } });

  // E: yalnız hub modunda kaynak topla.
  addEventListener("keydown", e => {
    if (!typing() && e.code === "KeyE" && mode === "hub" && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "gather" }));
      setTimeout(refreshInventory, 300);
    }
  });

  // Nişan + ateş: yalnız arena modunda. İmleç konumunu izle, tıklamada
  // "fire" gönder. aimX/aimY = imleç - kendi konumum (yön vektörü;
  // sunucu normalize eder, büyüklük önemsiz).
  canvas.addEventListener("mousemove", e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
    mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
  });
  canvas.addEventListener("mousedown", () => {
    if (mode !== "arena" || !arena || ws.readyState !== WebSocket.OPEN) return;
    const self = arena.players.find(p => p.id === me);
    if (!self || !self.alive) return;
    const dx = mouse.x - self.x, dy = mouse.y - self.y;
    if (dx === 0 && dy === 0) return;
    ws.send(JSON.stringify({ type: "fire", aimX: dx, aimY: dy }));
  });

  $("chat").addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const text = $("chat").value.trim();
    if (text && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "chat", text }));
      $("chat").value = "";
      setTimeout(refreshChatLog, 300);
    }
  });
  // Pencere odağı gidince tuşları bırak (takılı kalmasın).
  addEventListener("blur", () => { for (const k in keys) keys[k] = false;
    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "input", ...keys })); });
}

function setHudDefault() {
  $("hud").textContent = mode === "arena"
    ? "ARENA — WASD/oklar: hareket · fare: nişan · tıkla: ateş"
    : "bağlandı — WASD/oklar: hareket · E: topla · sohbet · takas · ⚔ Arena";
}

// ======================= HUB ÇİZİMİ =======================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // zemin ızgarası
  ctx.strokeStyle = "rgba(139,148,158,0.08)";
  ctx.lineWidth = 1;
  for (let x = 0; x <= canvas.width; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  // Bölge sınırları (grid hücreleri).
  ctx.strokeStyle = "rgba(31,111,235,0.35)";
  ctx.lineWidth = 2;
  for (let c = 1; c < cols; c++) {
    const x = c * canvas.width / cols;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    const y = r * canvas.height / rows;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  ctx.lineWidth = 1;

  for (const n of nodes) drawNode(n);
  for (const p of players) {
    const self = p.id === me;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = self ? "#1f6feb" : "#3fb950";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.stroke();
    ctx.fillStyle = "#c9d1d9";
    ctx.font = "12px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(p.name, p.x, p.y - 22);
    if (p.bubble) drawBubble(p);
  }
  const loc = region ? ` · bölge ${region} @ ${shard}` : "";
  $("hud").textContent = `HUB · tick ${tick}${loc} · bu bölgede ${players.length} oyuncu${invText()}`;
  refreshPartners();
}

function drawNode(n) {
  ctx.save();
  ctx.globalAlpha = n.available ? 1 : 0.25;
  if (n.kind === "crystal") {
    ctx.beginPath();
    ctx.moveTo(n.x, n.y - 12); ctx.lineTo(n.x + 10, n.y);
    ctx.lineTo(n.x, n.y + 12); ctx.lineTo(n.x - 10, n.y);
    ctx.closePath();
    ctx.fillStyle = "#39c5cf";
  } else {
    ctx.beginPath();
    ctx.roundRect(n.x - 11, n.y - 9, 22, 18, 4);
    ctx.fillStyle = "#ad7c4e";
  }
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.stroke();
  ctx.restore();

  const self = players.find(p => p.id === me);
  if (n.available && self && Math.hypot(n.x - self.x, n.y - self.y) <= 48) {
    ctx.fillStyle = "#e6edf3";
    ctx.font = "11px system-ui";
    ctx.textAlign = "center";
    ctx.fillText("E: topla", n.x, n.y + 26);
  }
}

// ======================= ARENA ÇİZİMİ =======================
const TEAM_COLOR = ["#58a6ff", "#f85149"]; // 0 mavi, 1 kırmızı

function drawArena() {
  if (!arena) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // zemin
  ctx.strokeStyle = "rgba(163,113,247,0.10)";
  ctx.lineWidth = 1;
  for (let x = 0; x <= canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // mermiler
  for (const pr of (arena.projectiles || [])) {
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = TEAM_COLOR[pr.team] || "#fff";
    ctx.fill();
  }

  // nişan çizgisi (kendi konumumdan imlece)
  const self = arena.players.find(p => p.id === me);
  if (self && self.alive) {
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(self.x, self.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // oyuncular
  for (const p of arena.players) {
    const self = p.id === me;
    ctx.globalAlpha = p.alive ? 1 : 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = TEAM_COLOR[p.team] || "#8b949e";
    ctx.fill();
    ctx.lineWidth = self ? 3 : 1;
    ctx.strokeStyle = self ? "#ffffff" : "rgba(255,255,255,0.4)";
    ctx.stroke();
    ctx.lineWidth = 1;

    // can barı
    const w = 30, h = 4, hx = p.x - w / 2, hy = p.y - 26;
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(hx, hy, w, h);
    ctx.fillStyle = p.health > 30 ? "#3fb950" : "#f85149";
    ctx.fillRect(hx, hy, w * Math.max(0, p.health) / 100, h);

    ctx.globalAlpha = 1;
    ctx.fillStyle = "#e6edf3";
    ctx.font = "12px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(p.name + (self ? " (sen)" : ""), p.x, p.y - 32);
  }
  ctx.globalAlpha = 1;

  // üst bilgi: kalan süre
  const sec = Math.max(0, Math.ceil((arena.remainingMs || 0) / 1000));
  ctx.fillStyle = "#c9d1d9";
  ctx.font = "bold 16px system-ui";
  ctx.textAlign = "center";
  ctx.fillText(`⏱ ${sec}s`, canvas.width / 2, 24);

  // maç bitti kaplaması
  if (arena.over) {
    ctx.fillStyle = "rgba(13,17,23,0.75)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 28px system-ui";
    let txt;
    if (arena.winnerTeam === -1) txt = "BERABERE";
    else if (arena.winnerTeam === myTeam) txt = "🏆 KAZANDIN";
    else txt = "ELENDİN";
    ctx.fillText(txt, canvas.width / 2, canvas.height / 2);
    ctx.font = "14px system-ui";
    ctx.fillStyle = "#8b949e";
    ctx.fillText("hub'a dönülüyor…", canvas.width / 2, canvas.height / 2 + 28);
  }

  const meP = arena.players.find(p => p.id === me);
  $("hud").textContent = `ARENA · tick ${arena.tick} · canın: ${meP ? Math.max(0, meP.health) : 0}`
    + ` · WASD hareket · fare nişan · tıkla ateş`;
}

// ======================= ORTAK / HTTP =======================
async function refreshStats() {
  try {
    const s = await (await fetch("/api/stats")).json();
    $("gTotal").textContent = s.totalGathered;
    $("gOnline").textContent = s.online;
  } catch {}
}

async function refreshInventory() {
  if (!me) return;
  try {
    const res = await fetch(`/api/inventory?player=${encodeURIComponent(me)}`);
    inventory = await res.json();
  } catch {}
}

function invText() {
  const parts = Object.entries(inventory).map(([k, n]) => `${KIND_TR[k] || k} ${n}`);
  return parts.length ? " · çanta: " + parts.join(", ") : "";
}

function drawBubble(p) {
  const text = p.bubble.length > 28 ? p.bubble.slice(0, 27) + "…" : p.bubble;
  ctx.font = "12px system-ui";
  const w = ctx.measureText(text).width + 14;
  const x = Math.min(Math.max(p.x, w / 2 + 2), canvas.width - w / 2 - 2);
  const y = p.y - 40;
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y - 18, w, 22, 8);
  ctx.fillStyle = "rgba(230,237,243,0.92)";
  ctx.fill();
  ctx.fillStyle = "#0d1117";
  ctx.textAlign = "center";
  ctx.fillText(text, x, y - 3);
}

async function refreshChatLog() {
  try {
    const res = await fetch("/api/chat/recent");
    const msgs = await res.json();
    $("chatlog").innerHTML = msgs.slice(-5).map(m =>
      `<div><b>${escapeHTML(m.name)}:</b> ${escapeHTML(m.text)}</div>`).join("");
  } catch {}
}

function refreshPartners() {
  const sel = $("partner");
  const others = players.filter(p => p.id !== me);
  const wanted = others.map(p => `${p.id} ${p.name}`).join("|");
  if (sel.dataset.sig === wanted) return;
  sel.dataset.sig = wanted;
  const prev = sel.value;
  sel.innerHTML = others.map(p => `<option value="${p.id}">${escapeHTML(p.name)}</option>`).join("");
  if (others.some(p => p.id === prev)) sel.value = prev;
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

$("go").onclick = join;
$("name").addEventListener("keydown", e => { if (e.key === "Enter") join(); });
</script>
</body>
</html>
